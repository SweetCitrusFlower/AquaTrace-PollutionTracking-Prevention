<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#4DA3AD"/>
      <stop offset="60%" stop-color="#35858E"/>
      <stop offset="100%" stop-color="#246069"/>
    </radialGradient>
    <linearGradient id="drop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E6EEC9"/>
      <stop offset="100%" stop-color="#C2D099"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background rounded square (maskable safe-area aware) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle decorative ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#7DA78C" stroke-opacity="0.25" stroke-width="2"/>
  <!-- Water droplet -->
  <g filter="url(#glow)">
    <path d="M 256 130
             C 256 130, 170 240, 170 308
             C 170 360, 210 400, 256 400
             C 302 400, 342 360, 342 308
             C 342 240, 256 130, 256 130 Z"
          fill="url(#drop)"/>
    <!-- Highlight on droplet -->
    <ellipse cx="226" cy="280" rx="18" ry="40" fill="#FFFFFF" fill-opacity="0.4"/>
  </g>
  <!-- Danube wave under the droplet -->
  <path d="M 80 430 Q 160 400, 256 430 T 432 430 L 432 470 L 80 470 Z"
        fill="#7DA78C" fill-opacity="0.7"/>
  <path d="M 80 430 Q 160 400, 256 430 T 432 430"
        fill="none" stroke="#C2D099" stroke-width="3" stroke-linecap="round"/>
</svg>
